remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

title: "Solutions and thoughts concerning GIS and more"
name: "Stefan Alpers"
description: ""
show_date: true
show_tags: true

author:
  name: "Stefan Alpers"
  location: "Oberhausen, Germany"
  bio: "Solution oriented GIS architect"
  email: "stefan.alpers@gmx.net"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/stefanalpers"

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

include:
  - _pages

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true